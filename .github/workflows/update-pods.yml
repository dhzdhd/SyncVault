name: Update CocoaPods

on:
  push:
    paths:
      - "pubspec.yaml"
      - "pubspec.lock"
  workflow_dispatch:

jobs:
  update-pods:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Update macOS Pods
        working-directory: macos
        run: pod update --repo-update

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update CocoaPods dependencies"
          title: "Update CocoaPods dependencies"
          body: |
            This PR updates the CocoaPods dependencies for macOS.

            Updated files:
            - `macos/Podfile.lock`

            Changes were automatically generated by the Update CocoaPods workflow.
          branch: chore/update-cocoapods
          delete-branch: true
          maintainer-can-modify: true
